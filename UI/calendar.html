<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendar - Pick Your Fit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="calendar-core.js"></script>
<style>
  :root{
    --linen: #F3EEE3;
    --linen-card: #FAF7EF;
    --ink: #22222b;
    --ink-soft: #6B6258;
    --thread: #B5442F;
    --sage: #7C8C72;
    --line: #D9D0BD;
    --side-bg: rgba(42, 34, 27, 0.85);
  }
  *{ box-sizing: border-box; margin: 0; padding: 0; }
  html, body{ max-width:100%; overflow-x:hidden; }
  body{
    background: var(--linen);
    background-image: repeating-linear-gradient(0deg, rgba(0,0,0,0.018) 0px, rgba(0,0,0,0.018) 1px, transparent 1px, transparent 3px);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height:100vh;
    display: flex;
  }
  a{ text-decoration:none; color:inherit; }
  button{ font-family:inherit; cursor:pointer; }

  /* ---------- Sidebar (matches the rest of the app) ---------- */
  .sidebar{
    position:fixed;top:0;left:0;bottom:0;z-index:5;
    width:88px; display:flex;flex-direction:column;align-items:center;
    padding:22px 0 20px; background:var(--side-bg);
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    border-right:1px solid rgba(255,255,255,0.08);
  }
  .side-logo{ width:44px;height:44px;border-radius:12px; display:flex;align-items:center;justify-content:center; color:#fff;margin-bottom:26px; }
  .side-logo svg{width:24px;height:24px;}
  .side-nav{ display:flex;flex-direction:column;gap:8px; flex:1; }
  .side-link{ width:46px;height:46px;border-radius:12px; display:flex;align-items:center;justify-content:center; color:rgba(255,255,255,0.62); transition:background .15s ease, color .15s ease; }
  .side-link svg{width:20px;height:20px;}
  .side-link:hover{color:#fff;background:rgba(255,255,255,0.08);}
  .side-link.active{background:#fdfcf9;color:var(--ink);}
  .side-bottom{ display:flex;flex-direction:column;align-items:center;gap:16px; margin-top:auto; }
  .side-avatar{ width:38px;height:38px;border-radius:50%; overflow:hidden; border:1.5px solid rgba(255,255,255,0.5); display:flex;align-items:center;justify-content:center; background:#c9c2b4; color:#5b5346; }
  .side-avatar img{width:100%;height:100%;object-fit:cover;display:block;}
  .side-avatar svg{width:22px;height:22px;}

  .main-content{ flex:1; min-width:0; margin-left:88px; display:flex; flex-direction:column; transition:margin-left .2s ease; }

  /* Header scales fluidly with viewport width instead of jumping between
     fixed values, so shrinking the desktop window gradually turns into the
     phone layout rather than "switching" to a different-looking header. */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: nowrap;
    gap: clamp(6px, 2vw, 14px);
    padding: clamp(10px, 3vw, 26px) clamp(14px, 4.5vw, 44px);
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--linen);
    background-image: repeating-linear-gradient(0deg, rgba(0,0,0,0.018) 0px, rgba(0,0,0,0.018) 1px, transparent 1px, transparent 3px);
    transition: padding .2s ease;
  }
  .logo{ font-family:'Fraunces',serif; font-size:clamp(11px, 2.6vw, 14px); font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink); white-space:nowrap; flex-shrink:0; }
  nav.main-nav{display:flex;gap:clamp(10px, 2vw, 34px); flex-shrink:1; min-width:0; align-items:center;}
  nav.main-nav a{ font-size:clamp(9px, 1.3vw, 12.5px);font-weight:600;letter-spacing:0.03em; text-transform:uppercase;color:var(--ink-soft); white-space:nowrap; }
  nav.main-nav a:hover{color:var(--ink);}
  .header-actions{display:flex;align-items:center;gap:clamp(6px, 2vw, 12px); flex-shrink:0;}
  .btn-header{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:clamp(6px, 1.6vw, 10px) clamp(11px, 3.2vw, 20px);
    border-radius:8px; font-size:clamp(9.5px, 2.2vw, 12.5px); font-weight:600;
    letter-spacing:0.02em;text-transform:uppercase; border:1px solid var(--ink);
    background:transparent;color:var(--ink); white-space:nowrap;
  }
  .btn-header:hover{background:rgba(0,0,0,0.05);}
  .btn-header-dark{background:var(--ink);color:var(--linen-card);}
  .btn-header-dark:hover{opacity:0.9;background:var(--ink);}

  .cal-container{ padding:6px clamp(12px, 4vw, 44px) clamp(56px, 10vw, 90px); max-width:1200px; margin:0 auto; width:100%; }
  .cal-heading{ font-family:'Fraunces', serif; font-weight:600; font-size:clamp(21px, 6vw, 32px); margin-bottom:6px; text-align:center; }
  .cal-sub{ text-align:center; color:var(--ink-soft); font-size:clamp(10.5px, 2.6vw, 13.5px); margin-bottom:clamp(16px, 4vw, 28px); }
  .login-prompt{ text-align:center; margin-top:50px; font-size:16px; color:var(--ink-soft); }
  .login-prompt a{ color:var(--thread); text-decoration:underline; font-weight:600; }

  /* ---------- Toolbar ---------- */
  .toolbar{ display:flex; flex-wrap:wrap; align-items:center; justify-content:space-between; gap:clamp(8px, 2.5vw, 14px); margin-bottom:18px; }
  .view-toggle{ display:flex; background:var(--linen-card); border:1px solid var(--line); border-radius:10px; padding:3px; flex-shrink:0; }
  .view-toggle button{ border:none; background:transparent; padding:clamp(6px, 1.8vw, 8px) clamp(9px, 3vw, 16px); border-radius:7px; font-size:clamp(10px, 2.4vw, 12px); font-weight:600; text-transform:uppercase; letter-spacing:0.03em; color:var(--ink-soft); }
  .view-toggle button.active{ background:var(--ink); color:var(--linen-card); }

  .nav-cluster{ display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:clamp(6px, 2vw, 10px); min-width:0; }
  .nav-arrow{ width:clamp(26px, 6.5vw, 32px); height:clamp(26px, 6.5vw, 32px); border-radius:8px; border:1px solid var(--line); background:var(--linen-card); display:flex; align-items:center; justify-content:center; color:var(--ink); flex-shrink:0; }
  .nav-arrow:hover{ background:#fff; }
  .nav-arrow svg{ width:clamp(11px, 2.6vw, 14px); height:clamp(11px, 2.6vw, 14px); }
  .period-label{ font-family:'Fraunces',serif; font-weight:600; font-size:clamp(13px, 3.4vw, 18px); min-width:clamp(96px, 28vw, 170px); text-align:center; }
  .today-btn{ padding:clamp(6px, 1.8vw, 8px) clamp(10px, 3vw, 14px); border-radius:8px; border:1px solid var(--ink); background:transparent; font-size:clamp(9.5px, 2.2vw, 11.5px); font-weight:600; text-transform:uppercase; letter-spacing:0.03em; color:var(--ink); flex-shrink:0; }
  .today-btn:hover{ background:rgba(0,0,0,0.05); }
  .archive-link{ padding:clamp(6px, 1.8vw, 8px) clamp(10px, 3vw, 14px); border-radius:8px; border:1px solid var(--line); background:var(--linen-card); font-size:clamp(9.5px, 2.2vw, 11.5px); font-weight:600; text-transform:uppercase; letter-spacing:0.03em; color:var(--ink-soft); display:inline-flex; align-items:center; gap:6px; white-space:nowrap; }
  .archive-link:hover{ color:var(--ink); background:#fff; }
  .archive-link svg{ width:13px; height:13px; flex-shrink:0; }

  .month-picker{ display:flex; gap:6px; overflow-x:auto; overflow-y:hidden; margin-bottom:20px; padding-bottom:4px; -webkit-overflow-scrolling:touch; }
  .month-picker button{ flex:0 0 auto; padding:clamp(5px, 1.6vw, 7px) clamp(9px, 3vw, 14px); border-radius:20px; border:1px solid var(--line); background:var(--linen-card); font-size:clamp(10px, 2.3vw, 11.5px); font-weight:600; color:var(--ink-soft); white-space:nowrap; }
  .month-picker button.active{ background:var(--thread); border-color:var(--thread); color:#fff; }
  .month-picker button:hover:not(.active){ background:#fff; color:var(--ink); }

  /* ---------- Month view ---------- */
  .month-grid{ background:transparent; }
  .weekday-row{ display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:8px; }
  .weekday-row span{ text-align:center; padding:clamp(3px, 1.2vw, 6px) 2px; font-size:clamp(8px, 2vw, 10.5px); font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:var(--ink-soft); }
  .day-grid{ display:grid; grid-template-columns:repeat(7,1fr); grid-auto-rows:clamp(56px, 15vw, 118px); gap:clamp(3px, 1.2vw, 6px); }
  .day-cell{ border:1px solid var(--line); border-radius:10px; background:var(--linen-card); position:relative; padding:clamp(3px, 1.2vw, 6px); overflow:hidden; text-align:left; min-width:0; }
  .day-cell:hover{ background:#fff; border-color:#c7bda5; }
  .day-num{ font-size:clamp(9px, 2.2vw, 11.5px); font-weight:600; color:var(--ink); }
  .day-cell.out-month{ background:transparent; border-color:transparent; }
  .day-cell.out-month .day-num{ color:var(--ink-soft); opacity:0.4; }
  .day-cell.is-today{ border-color:var(--thread); box-shadow:0 0 0 1px var(--thread) inset; }
  .day-cell.is-today .day-num{ display:inline-flex; align-items:center; justify-content:center; width:clamp(15px, 3.6vw, 20px); height:clamp(15px, 3.6vw, 20px); border-radius:50%; background:var(--thread); color:#fff; }
  .day-thumbs{ position:absolute; inset:clamp(16px, 5vw, 26px) clamp(2px, 0.8vw, 4px) 2px; display:flex; gap:clamp(2px, 0.8vw, 4px); align-items:flex-end; justify-content:center; }
  .pyf-mini-composite{ position:relative; width:clamp(19px, 6.2vw, 44px); height:clamp(33px, 11vw, 78px); flex:0 0 auto; }
  .day-more{ position:absolute; bottom:2px; right:3px; font-size:clamp(7.5px, 1.8vw, 9.5px); font-weight:700; color:var(--ink-soft); background:var(--linen); padding:1px 4px; border-radius:6px; }

  /* ---------- Week view ---------- */
  .week-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:clamp(4px, 1.6vw, 12px); }
  .week-col{ background:var(--linen-card); border:1px solid var(--line); border-radius:14px; padding:clamp(5px, 1.6vw, 12px) clamp(4px, 1.4vw, 10px); display:flex; flex-direction:column; min-height:clamp(170px, 32vw, 340px); min-width:0; }
  .week-col-head{ text-align:center; margin-bottom:10px; }
  .week-col-head .wd{ font-size:clamp(8px, 2vw, 10px); font-weight:700; letter-spacing:0.06em; text-transform:uppercase; color:var(--ink-soft); }
  .week-col-head .dn{ font-family:'Fraunces',serif; font-size:clamp(13px, 3.8vw, 20px); font-weight:600; }
  .week-col.is-today{ border-color:var(--thread); box-shadow:0 0 0 1.5px var(--thread) inset; }
  .week-outfits{ flex:1; display:flex; flex-direction:column; gap:clamp(6px, 2.4vw, 14px); align-items:center; }
  .week-outfit-wrap{ width:100%; text-align:center; }
  .pyf-week-composite{ position:relative; width:100%; max-width:120px; height:clamp(90px, 26vw, 190px); margin:0 auto 8px; }
  .week-empty{ color:var(--ink-soft); font-size:clamp(8px, 2vw, 11px); text-align:center; margin-top:20px; opacity:0.6; }
  .mini-actions{ display:flex; gap:5px; justify-content:center; }
  .mini-actions button{ width:clamp(19px, 4.6vw, 24px); height:clamp(19px, 4.6vw, 24px); border-radius:6px; border:1px solid var(--line); background:#fff; display:flex; align-items:center; justify-content:center; color:var(--ink-soft); }
  .mini-actions button:hover{ color:var(--ink); background:var(--linen); }
  .mini-actions button.fav-mini:hover{ color:var(--thread); }

  /* ---------- Year view ---------- */
  .year-grid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(140px, 1fr)); gap:clamp(10px, 3vw, 18px); }
  .year-month{ background:var(--linen-card); border:1px solid var(--line); border-radius:12px; padding:clamp(8px, 2.4vw, 12px); }
  .year-month-title{ font-family:'Fraunces',serif; font-weight:600; font-size:clamp(11px, 2.8vw, 14px); margin-bottom:8px; text-align:center; }
  .year-weekdays{ display:grid; grid-template-columns:repeat(7,1fr); }
  .year-weekdays span{ text-align:center; font-size:clamp(7px, 1.6vw, 8.5px); color:var(--ink-soft); font-weight:700; }
  .year-days{ display:grid; grid-template-columns:repeat(7,1fr); gap:1px; }
  .year-day{ aspect-ratio:1; display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:clamp(7.5px, 1.8vw, 9.5px); color:var(--ink-soft); border:none; background:none; position:relative; }
  .year-day.out-month{ opacity:0.25; }
  .year-day.is-today{ font-weight:700; color:var(--thread); }
  .year-day .dot{ width:4px; height:4px; border-radius:50%; background:var(--thread); position:absolute; bottom:2px; }
  .year-day:hover{ background:rgba(181,68,47,0.08); border-radius:4px; }

  /* ---------- Day detail modal ---------- */
  .overlay{ position:fixed; inset:0; z-index:60; background:rgba(28,26,23,0.55); display:none; align-items:center; justify-content:center; padding:clamp(12px, 4vw, 24px); }
  .overlay.show{ display:flex; }
  .detail-box{ background:var(--linen-card); border-radius:16px; border:1px solid var(--line); padding:clamp(16px, 4vw, 24px); max-width:640px; width:100%; max-height:85vh; overflow-y:auto; box-shadow:0 30px 60px rgba(20,15,10,0.35); }
  .detail-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; gap:10px; }
  .detail-title{ font-family:'Fraunces',serif; font-size:clamp(15px, 3.6vw, 19px); font-weight:600; }
  .detail-close{ border:none; background:none; color:var(--ink-soft); flex-shrink:0; }
  .detail-close:hover{ color:var(--ink); }
  .detail-empty{ text-align:center; color:var(--ink-soft); font-size:13.5px; padding:30px 0; }
  .detail-outfits{ display:grid; grid-template-columns:repeat(auto-fill, minmax(120px,1fr)); gap:clamp(10px, 3vw, 18px); }
  .detail-card{ display:flex; flex-direction:column; align-items:center; gap:10px; }
  .pyf-detail-composite{ position:relative; width:100%; max-width:140px; height:clamp(150px, 30vw, 220px); }
  .detail-tag{ font-family:'JetBrains Mono', monospace; font-size:9.5px; letter-spacing:0.08em; text-transform:uppercase; color:var(--sage); }
  .detail-actions{ display:flex; gap:8px; width:100%; }
  .detail-actions button{ flex:1; display:flex; align-items:center; justify-content:center; gap:5px; padding:8px 6px; border-radius:7px; font-size:10.5px; font-weight:600; text-transform:uppercase; letter-spacing:0.02em; border:1px solid var(--ink); background:transparent; color:var(--ink); }
  .detail-actions button:hover{ background:rgba(0,0,0,0.05); }
  .detail-actions svg{ width:12px; height:12px; }
  .detail-actions .fav-move-btn{ border-color:var(--thread); color:var(--thread); }
  .detail-actions .fav-move-btn:hover{ background:rgba(181,68,47,0.08); }

  .toast{ position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--ink); color:var(--linen-card); padding:12px 20px; border-radius:8px; font-size:12.5px; font-weight:600; letter-spacing:0.02em; z-index:70; opacity:0; pointer-events:none; transition:opacity .2s ease, transform .2s ease; max-width:calc(100% - 32px); text-align:center; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  /* ---------- Mobile footer nav (phone only, replaces header) ---------- */
  .mobile-footer-nav{ display:none; }
  .footer-nav-link{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:3px; flex:1; padding:6px 2px 4px;
    color:var(--ink-soft);
    font-family:'JetBrains Mono', monospace;
    font-size:8.5px; letter-spacing:0.02em; text-transform:uppercase;
    transition:color .15s ease;
  }
  .footer-nav-link svg{ width:19px; height:19px; }
  .footer-nav-link:hover{ color:var(--ink); }
  .footer-nav-link.active{ color:var(--thread); }

  @media (max-width: 980px){
    .sidebar{width:64px;}
    .main-content{margin-left:64px;}
  }

  /* ---------- Mobile menu toggle (phone only) ---------- */
  .menu-toggle{
    display:none;
    position:fixed; top:16px; left:16px; z-index:40;
    width:38px;height:38px;border-radius:9px;
    align-items:center;justify-content:center;
    background:var(--ink); color:#fff;
    border:none; cursor:pointer;
    box-shadow:0 4px 14px rgba(0,0,0,0.25);
  }
  .menu-toggle svg{width:19px;height:19px;}
  .sidebar-backdrop{
    display:none;
    position:fixed;inset:0;z-index:15;
    background:rgba(20,15,10,0.45);
  }

  /* Below 700px the sidebar hides completely behind a hamburger, so the
     header collapses to the same compact bar used across the rest of the
     app (see index.html) rather than a scaled-down version of the desktop
     one — this is the one deliberate "jump", everything else above is a
     continuous clamp()-based scale down to this point. */
  @media (max-width: 700px){
    .menu-toggle{ display:flex; top:8px; left:8px; width:32px; height:32px; }
    .menu-toggle svg{ width:16px; height:16px; }
    .sidebar{ transform:translateX(-100%); transition:transform .25s ease; z-index:20; padding-bottom:calc(70px + env(safe-area-inset-bottom)); }
    .sidebar.open{ transform:translateX(0); box-shadow:8px 0 30px rgba(0,0,0,0.3); }
    .sidebar-backdrop.open{ display:block; }
    .main-content{ margin-left:0; }

    /* Header is replaced by the bottom footer nav on phones */
    header{ display:none; }

    .mobile-footer-nav{
      display:flex;
      position:fixed; left:0; right:0; bottom:0; z-index:30;
      background:rgba(243,238,227,0.92);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      border-top:1px solid rgba(217,208,189,0.7);
      padding:6px 4px calc(6px + env(safe-area-inset-bottom));
      justify-content:space-around;
      align-items:center;
    }

    .cal-container{ padding-top:44px; padding-bottom:96px; }
  }

  @media (max-width: 420px){
    .period-label{ min-width:74px; }
    .today-btn{ display:none; }
  }

  /* ===== Unified header / sidebar / mobile-nav (exact copy of features.html) ===== */
  :root{
    --linen-card: #FAF7EF;
    --ink: #22222b;
    --ink-soft: #6B6258;
    --thread: #B5442F;
    --side-bg: rgba(42, 34, 27, 0.85);
  }
  body{ display:flex; }

  /* ---------- Sidebar ---------- */
  .sidebar{
    position:fixed;top:0;left:0;bottom:0;z-index:50;
    width:88px;
    display:flex;flex-direction:column;align-items:center;
    padding:0px 0 20px;
    background:var(--side-bg);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    border-right:1px solid rgba(255,255,255,0.08);
    transition: all 0.3s ease;
  }
  .side-logo{
    width:44px;height:44px;border-radius:12px;
    display:flex;align-items:center;justify-content:center;
    color:#fff;margin-bottom:26px;
  }
  .side-logo svg{width:24px;height:24px;}
  .side-nav{ display:flex;flex-direction:column;gap:8px; flex:1; }
  .side-link{
    width:46px;height:46px;border-radius:12px;
    display:flex;align-items:center;justify-content:center;
    color:rgba(255,255,255,0.62);
    transition:background .15s ease, color .15s ease;
  }
  .side-link svg{width:20px;height:20px;}
  .side-link:hover{color:#fff;background:rgba(255,255,255,0.08);}
  .side-link.active{background:#fdfcf9;color:var(--ink);}
  .side-bottom{ display:flex;flex-direction:column;align-items:center;gap:16px; margin-top:auto; }
  .side-avatar{
    width:38px;height:38px;border-radius:50%;
    overflow:hidden;
    border:1.5px solid rgba(255,255,255,0.5);
    display:flex;align-items:center;justify-content:center;
    background:#c9c2b4; color:#5b5346; cursor:pointer;
  }
  .side-avatar img{width:100%;height:100%;object-fit:cover;display:block;}
  .side-avatar svg{width:22px;height:22px;}
  .side-avatar.active{ box-shadow: 0 0 0 2px #fdfcf9; }

  /* ---------- Main layout ---------- */
  .main-content{
    flex:1;
    margin-left:88px;
    position:relative;
    display:flex;
    flex-direction:column;
    transition: margin-left .2s ease;
    min-width: 0;
    max-width: 100%;
  }

  header{
    position:sticky; top:0; z-index:12;
    display:flex;align-items:center;justify-content:space-between;
    gap:14px;
    padding:16px 40px;
    background:rgba(243,238,227,0.86);
    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);
    border-bottom:1px solid rgba(217,208,189,0.7);
  }
  .logo{
    font-family:'Fraunces',serif;
    font-size:13px;font-weight:600;letter-spacing:0.08em;
    text-transform:uppercase;color:var(--ink);
    white-space:nowrap;
  }
  nav.main-nav{display:flex;gap:clamp(14px, 2vw, 30px); align-items:center;}
  nav.main-nav a{
    font-size:11.5px;font-weight:600;letter-spacing:0.02em;
    text-transform:uppercase;color:var(--ink-soft);
    transition:color .15s ease;
    white-space:nowrap;
  }
  nav.main-nav a:hover{color:var(--ink);}
  nav.main-nav a.active{color:var(--thread);}
  .header-actions{display:flex;align-items:center;gap:10px;}
  .btn-header{
    display:inline-flex;align-items:center;justify-content:center;gap:4px;
    padding:8px 16px;border-radius:6px;
    font-size:11.5px;font-weight:600;
    letter-spacing:0.02em;text-transform:uppercase;
    cursor:pointer;border:1px solid var(--ink);
    background:transparent;color:var(--ink);
    transition:background .15s ease, opacity .15s ease;
    white-space:nowrap;
  }
  .btn-header:hover{background:rgba(0,0,0,0.05);}
  .btn-header-dark{background:var(--ink);border-color:var(--ink);color:var(--linen-card);}
  .btn-header-dark:hover{opacity:0.9;}

  /* ---------- Mobile menu & footer nav ---------- */
  .mobile-footer-nav{ display:none; }
  .footer-nav-link{
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:3px; flex:1; padding:6px 2px 4px;
    color:var(--ink-soft);

    transition:color .15s ease;
  }
  .footer-nav-link svg{ width:19px; height:19px; }
  .footer-nav-link:hover{ color:var(--ink); }
  .footer-nav-link.active{ color:var(--thread); }

  .menu-toggle{
    display:none;
    position:fixed; top:16px; left:16px; z-index:40;
    width:38px;height:38px;border-radius:9px;
    align-items:center;justify-content:center;
    background:var(--ink); color:#fff;
    border:none; cursor:pointer;
    box-shadow:0 4px 14px rgba(0,0,0,0.25);
  }
  .menu-toggle svg{width:19px;height:19px;}
  .sidebar-backdrop{
    display:none;
    position:fixed;inset:0;z-index:15;
    background:rgba(20,15,10,0.45);
  }

  @media (max-width: 700px){
    .menu-toggle{ display:flex; top:8px; left:8px; width:32px; height:32px; }
    .menu-toggle svg{ width:16px; height:16px; }

    .sidebar{ transform:translateX(-100%); transition:transform .25s ease; z-index:50; padding-bottom:calc(70px + env(safe-area-inset-bottom)); }
    .sidebar.open{ transform:translateX(0); box-shadow:8px 0 30px rgba(0,0,0,0.3); }

      padding:6px 4px calc(6px + env(safe-area-inset-bottom));
      justify-content:space-around;
      align-items:center;
    }
  }

  @media (max-width: 480px){
    .side-nav { gap: 2px; }
    .side-link { width: 38px; height: 38px; }

</style>

<script>
  const idToken = localStorage.getItem('pyf_idToken');
  const userPhoto = localStorage.getItem('pyf_userPhoto');
  const isLoggedIn = !!idToken;
  const calContainer = document.getElementById('calContainer');

  if (isLoggedIn) {
    const avatarLink = document.getElementById('sideAvatarLink');
    if (userPhoto) {
      document.getElementById('userAvatarImg').src = userPhoto;
      document.getElementById('userAvatarImg').style.display = 'block';
      document.getElementById('defaultAvatarIcon').style.display = 'none';
    }
    avatarLink.href = 'profile.html';
    document.getElementById('headerActions').innerHTML = '<a href="index.html" class="btn-header btn-header-dark">Scan New Item</a>';
  } else {
    calContainer.innerHTML = '<div class="login-prompt"><h2>Your Calendar is Locked</h2><p>Please <a href="login.html">Log In</a> or <a href="signup.html">Register</a> to plan and review your outfits.</p></div>';
  }

  if (isLoggedIn && typeof PYFCal === 'undefined') {
    calContainer.innerHTML = '<div class="login-prompt"><h2>Calendar failed to load</h2><p>The file <code>calendar-core.js</code> could not be found. Make sure it sits in the same folder as calendar.html on the server, then refresh.</p></div>';
  }

  if (isLoggedIn && typeof PYFCal !== 'undefined') {
    const { MONTH_NAMES, WEEKDAY_SHORT, getCalendarEntries, buildDateMap, toDateStr, todayStr,
            deleteCalendarEntry, moveCalendarEntryToFavorites, renderOutfitComposite, monthMatrix } = PYFCal;

    const today = new Date();
    let view = 'month'; // 'week' | 'month' | 'year'
    let cursor = new Date(today.getFullYear(), today.getMonth(), today.getDate());

    calContainer.innerHTML = `
      <p class="cal-heading">Calendar</p>
      <p class="cal-sub">Every outfit you've planned, right where you put it.</p>
      <div class="toolbar">
        <div class="view-toggle" id="viewToggle">
          <button type="button" data-view="week">Week</button>
          <button type="button" data-view="month">Month</button>
          <button type="button" data-view="year">Year</button>
        </div>
        <div class="nav-cluster">
          <button type="button" class="nav-arrow" id="prevBtn" aria-label="Previous">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <span class="period-label" id="periodLabel"></span>
          <button type="button" class="nav-arrow" id="nextBtn" aria-label="Next">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button type="button" class="today-btn" id="todayBtn">Today</button>
        </div>
        <a href="archive.html" class="archive-link">
          <svg viewBox="0 0 24 24" fill="none"><rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="1.6"/><path d="M4 9h16" stroke="currentColor" stroke-width="1.6"/></svg>
          View Archive
        </a>
      </div>
      <div class="month-picker" id="monthPicker"></div>
      <div id="viewBody"></div>
    `;

    const periodLabel = document.getElementById('periodLabel');
    const viewBody = document.getElementById('viewBody');
    const monthPicker = document.getElementById('monthPicker');
    const viewToggle = document.getElementById('viewToggle');
    const detailOverlay = document.getElementById('detailOverlay');
    const detailTitle = document.getElementById('detailTitle');
    const detailBody = document.getElementById('detailBody');

    MONTH_NAMES.forEach((name, i) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.textContent = name.slice(0, 3);
      btn.dataset.month = i;
      btn.onclick = () => { cursor = new Date(cursor.getFullYear(), i, 1); view = 'month'; render(); };
      monthPicker.appendChild(btn);
    });

    viewToggle.querySelectorAll('button').forEach((btn) => {
      btn.onclick = () => { view = btn.dataset.view; render(); };
    });

    document.getElementById('todayBtn').onclick = () => { cursor = new Date(today.getFullYear(), today.getMonth(), today.getDate()); render(); };
    document.getElementById('prevBtn').onclick = () => { step(-1); };
    document.getElementById('nextBtn').onclick = () => { step(1); };
    document.getElementById('detailClose').onclick = () => detailOverlay.classList.remove('show');
    detailOverlay.addEventListener('click', (e) => { if (e.target === detailOverlay) detailOverlay.classList.remove('show'); });

    function step(dir) {
      if (view === 'week') cursor = new Date(cursor.getFullYear(), cursor.getMonth(), cursor.getDate() + dir * 7);
      else if (view === 'month') cursor = new Date(cursor.getFullYear(), cursor.getMonth() + dir, 1);
      else cursor = new Date(cursor.getFullYear() + dir, cursor.getMonth(), cursor.getDate());
      render();
    }

    let toastTimer = null;
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2400);
    }

    function actionButtons(entry, onChange) {
      const wrap = document.createElement('div');
      wrap.className = 'mini-actions';

      const del = document.createElement('button');
      del.type = 'button';
      del.title = 'Delete';
      del.innerHTML = '<svg viewBox="0 0 24 24" fill="none" width="12" height="12"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>';
      del.onclick = async (e) => { e.stopPropagation(); await deleteCalendarEntry(entry); showToast('Removed from calendar.'); onChange(); };

      const fav = document.createElement('button');
      fav.type = 'button';
      fav.className = 'fav-mini';
      fav.title = 'Delete and save to favorites';
      fav.innerHTML = '<svg viewBox="0 0 24 24" fill="none" width="12" height="12"><path d="M12 20 C6.5 15.8, 3.5 12, 3.5 8.2 C3.5 5.1, 5.8 3, 8.5 3 C10.3 3, 11.7 4, 12 5.6 C12.3 4, 13.7 3, 15.5 3 C18.2 3, 20.5 5.1, 20.5 8.2 C20.5 12, 17.5 15.8, 12 20 Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>';
      fav.onclick = async (e) => { e.stopPropagation(); await moveCalendarEntryToFavorites(entry); showToast('Moved to favorites.'); onChange(); };

      wrap.appendChild(del);
      wrap.appendChild(fav);
      return wrap;
    }

    function openDetail(dateStr, dateObj) {
      const dateMap = buildDateMap(getCalendarEntries());
      const entries = dateMap[dateStr] || [];
      detailTitle.textContent = dateObj.toLocaleDateString(undefined, { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
      detailBody.innerHTML = '';
      if (!entries.length) {
        const empty = document.createElement('p');
        empty.className = 'detail-empty';
        empty.textContent = 'Nothing planned for this day yet.';
        detailBody.appendChild(empty);
      } else {
        const grid = document.createElement('div');
        grid.className = 'detail-outfits';
        entries.forEach((entry) => {
          const card = document.createElement('div');
          card.className = 'detail-card';
          const tag = document.createElement('p');
          tag.className = 'detail-tag';
          tag.textContent = entry.type === 'A' ? 'Layered look' : 'Dress / jumpsuit look';
          card.appendChild(tag);
          card.appendChild(renderOutfitComposite(entry, 'pyf-detail-composite'));
          const actions = document.createElement('div');
          actions.className = 'detail-actions';

          const delBtn = document.createElement('button');
          delBtn.type = 'button';
          delBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg> Delete';
          delBtn.onclick = async () => { await deleteCalendarEntry(entry); showToast('Removed from calendar.'); openDetail(dateStr, dateObj); render(); };

          const favBtn = document.createElement('button');
          favBtn.type = 'button';
          favBtn.className = 'fav-move-btn';
          favBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none"><path d="M12 20 C6.5 15.8, 3.5 12, 3.5 8.2 C3.5 5.1, 5.8 3, 8.5 3 C10.3 3, 11.7 4, 12 5.6 C12.3 4, 13.7 3, 15.5 3 C18.2 3, 20.5 5.1, 20.5 8.2 C20.5 12, 17.5 15.8, 12 20 Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg> Delete & favorite';
          favBtn.onclick = async () => { await moveCalendarEntryToFavorites(entry); showToast('Moved to favorites.'); openDetail(dateStr, dateObj); render(); };

          actions.appendChild(delBtn);
          actions.appendChild(favBtn);
          card.appendChild(actions);
          grid.appendChild(card);
        });
        detailBody.appendChild(grid);
      }
      detailOverlay.classList.add('show');
    }

    function renderMonth() {
      const year = cursor.getFullYear(), monthIndex = cursor.getMonth();
      periodLabel.textContent = `${MONTH_NAMES[monthIndex]} ${year}`;
      monthPicker.style.display = 'flex';
      monthPicker.querySelectorAll('button').forEach((b) => b.classList.toggle('active', Number(b.dataset.month) === monthIndex));

      const dateMap = buildDateMap(getCalendarEntries());
      const cells = monthMatrix(year, monthIndex);

      const grid = document.createElement('div');
      grid.className = 'month-grid';
      const weekdayRow = document.createElement('div');
      weekdayRow.className = 'weekday-row';
      WEEKDAY_SHORT.forEach((w) => { const s = document.createElement('span'); s.textContent = w; weekdayRow.appendChild(s); });
      grid.appendChild(weekdayRow);

      const dayGrid = document.createElement('div');
      dayGrid.className = 'day-grid';
      cells.forEach((cell) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'day-cell' + (cell.inMonth ? '' : ' out-month') + (cell.isToday ? ' is-today' : '');
        const num = document.createElement('span');
        num.className = 'day-num';
        num.textContent = cell.dayNum;
        btn.appendChild(num);

        const entries = dateMap[cell.dateStr] || [];
        if (entries.length) {
          const thumbs = document.createElement('div');
          thumbs.className = 'day-thumbs';
          entries.slice(0, 2).forEach((entry) => thumbs.appendChild(renderOutfitComposite(entry, 'pyf-mini-composite')));
          btn.appendChild(thumbs);
          if (entries.length > 2) {
            const more = document.createElement('span');
            more.className = 'day-more';
            more.textContent = '+' + (entries.length - 2);
            btn.appendChild(more);
          }
        }
        btn.onclick = () => openDetail(cell.dateStr, cell.date);
        dayGrid.appendChild(btn);
      });
      grid.appendChild(dayGrid);
      viewBody.innerHTML = '';
      viewBody.appendChild(grid);
    }

    function renderWeek() {
      const dow = (cursor.getDay() + 6) % 7;
      const weekStart = new Date(cursor.getFullYear(), cursor.getMonth(), cursor.getDate() - dow);
      const weekEnd = new Date(weekStart.getFullYear(), weekStart.getMonth(), weekStart.getDate() + 6);
      const sameMonth = weekStart.getMonth() === weekEnd.getMonth();
      periodLabel.textContent = sameMonth
        ? `${weekStart.getDate()}–${weekEnd.getDate()} ${MONTH_NAMES[weekStart.getMonth()]} ${weekStart.getFullYear()}`
        : `${weekStart.getDate()} ${MONTH_NAMES[weekStart.getMonth()].slice(0,3)} – ${weekEnd.getDate()} ${MONTH_NAMES[weekEnd.getMonth()].slice(0,3)} ${weekEnd.getFullYear()}`;
      monthPicker.style.display = 'flex';
      monthPicker.querySelectorAll('button').forEach((b) => b.classList.toggle('active', Number(b.dataset.month) === cursor.getMonth()));

      const dateMap = buildDateMap(getCalendarEntries());
      const grid = document.createElement('div');
      grid.className = 'week-grid';
      const isToday = todayStr();

      for (let i = 0; i < 7; i++) {
        const d = new Date(weekStart.getFullYear(), weekStart.getMonth(), weekStart.getDate() + i);
        const dStr = toDateStr(d);
        const col = document.createElement('div');
        col.className = 'week-col' + (dStr === isToday ? ' is-today' : '');
        col.innerHTML = `<div class="week-col-head"><div class="wd">${WEEKDAY_SHORT[i]}</div><div class="dn">${d.getDate()}</div></div>`;

        const outfitsWrap = document.createElement('div');
        outfitsWrap.className = 'week-outfits';
        const entries = dateMap[dStr] || [];
        if (!entries.length) {
          const empty = document.createElement('p');
          empty.className = 'week-empty';
          empty.textContent = 'Nothing planned';
          outfitsWrap.appendChild(empty);
        } else {
          entries.forEach((entry) => {
            const w = document.createElement('div');
            w.className = 'week-outfit-wrap';
            w.appendChild(renderOutfitComposite(entry, 'pyf-week-composite'));
            w.appendChild(actionButtons(entry, () => render()));
            outfitsWrap.appendChild(w);
          });
        }
        col.appendChild(outfitsWrap);
        grid.appendChild(col);
      }
      viewBody.innerHTML = '';
      viewBody.appendChild(grid);
    }

    function renderYear() {
      const year = cursor.getFullYear();
      periodLabel.textContent = `${year}`;
      monthPicker.style.display = 'none';

      const dateMap = buildDateMap(getCalendarEntries());
      const grid = document.createElement('div');
      grid.className = 'year-grid';

      for (let m = 0; m < 12; m++) {
        const card = document.createElement('div');
        card.className = 'year-month';
        card.innerHTML = `<div class="year-month-title">${MONTH_NAMES[m]}</div>
          <div class="year-weekdays">${WEEKDAY_SHORT.map((w) => `<span>${w[0]}</span>`).join('')}</div>`;
        const daysWrap = document.createElement('div');
        daysWrap.className = 'year-days';
        monthMatrix(year, m).forEach((cell) => {
          const d = document.createElement('button');
          d.type = 'button';
          d.className = 'year-day' + (cell.inMonth ? '' : ' out-month') + (cell.isToday ? ' is-today' : '');
          d.textContent = cell.dayNum;
          if ((dateMap[cell.dateStr] || []).length) {
            const dot = document.createElement('span');
            dot.className = 'dot';
            d.appendChild(dot);
          }
          d.onclick = () => { cursor = cell.date; view = 'month'; render(); };
          daysWrap.appendChild(d);
        });
        card.appendChild(daysWrap);
        grid.appendChild(card);
      }
      viewBody.innerHTML = '';
      viewBody.appendChild(grid);
    }

    function render() {
      viewToggle.querySelectorAll('button').forEach((b) => b.classList.toggle('active', b.dataset.view === view));
      if (view === 'month') renderMonth();
      else if (view === 'week') renderWeek();
      else renderYear();
    }

    viewBody.innerHTML = '<p class="cal-sub">Loading your calendar…</p>';
    PYFCal.init()
      .then(() => render())
      .catch((err) => {
        console.error('Calendar load error:', err);
        viewBody.innerHTML = '<div class="login-prompt"><h2>Could not load your calendar</h2><p>Please refresh the page, or log in again.</p></div>';
      });
  }
</script>

</body>
</html>
