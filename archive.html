<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archive - Pick Your Fit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="calendar-core.js"></script>
<style>
  :root{
    --linen: #F3EEE3;
    --linen-card: #FAF7EF;
    --ink: #22222b;
    --ink-soft: #6B6258;
    --thread: #B5442F;
    --sage: #7C8C72;
    --line: #D9D0BD;
    --side-bg: rgba(42, 34, 27, 0.85);
  }
  *{ box-sizing: border-box; margin: 0; padding: 0; }
  body{
    background: var(--linen);
    background-image: repeating-linear-gradient(0deg, rgba(0,0,0,0.018) 0px, rgba(0,0,0,0.018) 1px, transparent 1px, transparent 3px);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    min-height:100vh;
    display: flex;
  }
  a{ text-decoration:none; color:inherit; }
  button{ font-family:inherit; cursor:pointer; }

  .sidebar{ position:fixed;top:0;left:0;bottom:0;z-index:5; width:88px; display:flex;flex-direction:column;align-items:center; padding:22px 0 20px; background:var(--side-bg); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); border-right:1px solid rgba(255,255,255,0.08); }
  .side-logo{ width:44px;height:44px;border-radius:12px; display:flex;align-items:center;justify-content:center; color:#fff;margin-bottom:26px; }
  .side-logo svg{width:24px;height:24px;}
  .side-nav{ display:flex;flex-direction:column;gap:8px; flex:1; }
  .side-link{ width:46px;height:46px;border-radius:12px; display:flex;align-items:center;justify-content:center; color:rgba(255,255,255,0.62); transition:background .15s ease, color .15s ease; }
  .side-link svg{width:20px;height:20px;}
  .side-link:hover{color:#fff;background:rgba(255,255,255,0.08);}
  .side-link.active{background:#fdfcf9;color:var(--ink);}
  .side-bottom{ display:flex;flex-direction:column;align-items:center;gap:16px; margin-top:auto; }
  .side-avatar{ width:38px;height:38px;border-radius:50%; overflow:hidden; border:1.5px solid rgba(255,255,255,0.5); display:flex;align-items:center;justify-content:center; background:#c9c2b4; color:#5b5346; }
  .side-avatar img{width:100%;height:100%;object-fit:cover;display:block;}
  .side-avatar svg{width:22px;height:22px;}

  .main-content{ flex:1; margin-left:88px; display:flex; flex-direction:column; }
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 26px 44px;
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--linen);
    background-image: repeating-linear-gradient(0deg, rgba(0,0,0,0.018) 0px, rgba(0,0,0,0.018) 1px, transparent 1px, transparent 3px);
  }
  .logo{ font-family:'Fraunces',serif; font-size:14px;font-weight:600;letter-spacing:0.16em; text-transform:uppercase;color:var(--ink); }
  nav.main-nav{display:flex;gap:34px;}
  nav.main-nav a{ font-size:12.5px;font-weight:600;letter-spacing:0.03em; text-transform:uppercase;color:var(--ink-soft); }
  nav.main-nav a:hover{color:var(--ink);}
  .header-actions{display:flex;align-items:center;gap:12px;}
  .btn-header{ display:inline-flex;align-items:center;justify-content:center;gap:8px; padding:10px 20px;border-radius:8px;font-size:12.5px;font-weight:600; letter-spacing:0.02em;text-transform:uppercase; border:1px solid var(--ink); background:transparent;color:var(--ink); }
  .btn-header:hover{background:rgba(0,0,0,0.05);}
  .btn-header-dark{background:var(--ink);color:var(--linen-card);}
  .btn-header-dark:hover{opacity:0.9;background:var(--ink);}

  .arc-container{ padding:6px 44px 90px; max-width:1280px; margin:0 auto; width:100%; }
  .arc-heading{ font-family:'Fraunces', serif; font-weight:600; font-size:32px; margin-bottom:6px; text-align:center; }
  .arc-sub{ text-align:center; color:var(--ink-soft); font-size:13.5px; margin-bottom:26px; }
  .login-prompt{ text-align:center; margin-top:50px; font-size:16px; color:var(--ink-soft); }
  .login-prompt a{ color:var(--thread); text-decoration:underline; font-weight:600; }

  .toolbar{ display:flex; align-items:center; justify-content:center; gap:14px; margin-bottom:26px; }
  .nav-arrow{ width:32px; height:32px; border-radius:8px; border:1px solid var(--line); background:var(--linen-card); display:flex; align-items:center; justify-content:center; color:var(--ink); }
  .nav-arrow:hover{ background:#fff; }
  .nav-arrow:disabled{ opacity:0.35; cursor:default; }
  .year-label{ font-family:'Fraunces',serif; font-weight:600; font-size:22px; min-width:90px; text-align:center; }
  .back-link{ padding:8px 14px; border-radius:8px; border:1px solid var(--line); background:var(--linen-card); font-size:11.5px; font-weight:600; text-transform:uppercase; letter-spacing:0.03em; color:var(--ink-soft); display:inline-flex; align-items:center; gap:6px; margin-left:10px; }
  .back-link:hover{ color:var(--ink); background:#fff; }
  .back-link svg{ width:13px; height:13px; }

  .empty-year{ text-align:center; color:var(--ink-soft); font-size:14px; padding:60px 0; }

  .arc-grid{ display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:20px; }
  .arc-month{ background:var(--linen-card); border:1px solid var(--line); border-radius:14px; padding:14px; }
  .arc-month-title{ font-family:'Fraunces',serif; font-weight:600; font-size:15px; margin-bottom:10px; text-align:center; }
  .arc-weekdays{ display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:2px; }
  .arc-weekdays span{ text-align:center; font-size:9px; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; color:var(--ink-soft); }
  .arc-days{ display:grid; grid-template-columns:repeat(7,1fr); grid-auto-rows:66px; gap:2px; }
  .arc-day{ position:relative; border-radius:6px; }
  .arc-day.out-month{ opacity:0.3; }
  .arc-day-num{ position:absolute; top:2px; left:3px; font-size:8.5px; font-weight:600; color:var(--ink-soft); z-index:5; }
  .pyf-arc-composite{ position:absolute; inset:11px 2px 2px; }
  .arc-mini-actions{ position:absolute; bottom:1px; right:1px; display:flex; gap:2px; z-index:6; opacity:0; transition:opacity .12s ease; }
  .arc-day:hover .arc-mini-actions{ opacity:1; }
  .arc-mini-actions button{ width:15px; height:15px; border-radius:4px; border:1px solid var(--line); background:#fff; display:flex; align-items:center; justify-content:center; color:var(--ink-soft); padding:0; }
  .arc-mini-actions button:hover{ color:var(--ink); }
  .arc-mini-actions button.fav-mini:hover{ color:var(--thread); }
  .arc-mini-actions svg{ width:8px; height:8px; }

  .toast{ position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--ink); color:var(--linen-card); padding:12px 20px; border-radius:8px; font-size:12.5px; font-weight:600; letter-spacing:0.02em; z-index:70; opacity:0; pointer-events:none; transition:opacity .2s ease, transform .2s ease; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  @media (max-width: 980px){
    .sidebar{width:64px;}
    .main-content{margin-left:64px;}
    header{padding:22px 24px;}
    nav.main-nav{display:none;}
    .arc-container{padding:6px 18px 80px;}
  }

  /* ---------- Mobile menu toggle (phone only) ---------- */
  .menu-toggle{
    display:none;
    position:fixed; top:16px; left:16px; z-index:40;
    width:38px;height:38px;border-radius:9px;
    align-items:center;justify-content:center;
    background:var(--ink); color:#fff;
    border:none; cursor:pointer;
    box-shadow:0 4px 14px rgba(0,0,0,0.25);
  }
  .menu-toggle svg{width:19px;height:19px;}
  .sidebar-backdrop{
    display:none;
    position:fixed;inset:0;z-index:15;
    background:rgba(20,15,10,0.45);
  }
  @media (max-width: 700px){
    .menu-toggle{ display:flex; }
    .sidebar{ transform:translateX(-100%); transition:transform .25s ease; z-index:20; }
    .sidebar.open{ transform:translateX(0); box-shadow:8px 0 30px rgba(0,0,0,0.3); }
    .sidebar-backdrop.open{ display:block; }
    .main-content{ margin-left:0; }
    header { 
      padding: 14px 16px 14px 64px; 
    }
    .btn-header { 
      padding: 8px 12px; 
      font-size: 11px; 
    }
    .logo { 
      font-size: 12px; 
    }
  }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="side-logo">
    <svg viewBox="0 0 24 24" fill="none"><path d="M12 3 L15.5 5.5 L12 8 L8.5 5.5 Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/><path d="M12 8 L3 13 L3 14 L21 14 L21 13 Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>
  </div>
  <nav class="side-nav">
    <a href="landing.html" class="side-link" title="Home">
      <svg viewBox="0 0 24 24" fill="none"><path d="M4 11.5 L12 5 L20 11.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 10.5 V19 a1 1 0 0 0 1 1 h10 a1 1 0 0 0 1 -1 V10.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <a href="favorites.html" class="side-link" title="Favorites">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 20 C6.5 15.8, 3.5 12, 3.5 8.2 C3.5 5.1, 5.8 3, 8.5 3 C10.3 3, 11.7 4, 12 5.6 C12.3 4, 13.7 3, 15.5 3 C18.2 3, 20.5 5.1, 20.5 8.2 C20.5 12, 17.5 15.8, 12 20 Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>
    </a>
    <a href="calendar.html" class="side-link active" title="Calendar">
      <svg viewBox="0 0 24 24" fill="none"><rect x="4" y="5.5" width="16" height="14.5" rx="2" stroke="currentColor" stroke-width="1.6"/><line x1="4" y1="10" x2="20" y2="10" stroke="currentColor" stroke-width="1.6"/><line x1="8.3" y1="3" x2="8.3" y2="7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><line x1="15.7" y1="3" x2="15.7" y2="7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </a>
    <a href="wardrobe.html" class="side-link" title="Wardrobe">
      <svg viewBox="0 0 24 24" fill="none"><path d="M8.5 4 L10 6 h4 l1.5 -2" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M8.5 4 L4 7.5 L6.5 10.5 L8 9.3 V20 h8 V9.3 l1.5 1.2 L20 7.5 L15.5 4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </a>
    <a href="outfits.html" class="side-link" title="Outfits">
      <svg viewBox="0 0 24 24" fill="none"><rect x="7.5" y="3" width="11" height="14" rx="2" stroke="currentColor" stroke-width="1.6" transform="rotate(8 13 10)"/><rect x="5" y="6.5" width="14" height="15" rx="2" stroke="currentColor" stroke-width="1.6"/></svg>
    </a>
    <a href="create-outfit.html" class="side-link" title="Create your own outfit">
      <svg viewBox="0 0 24 24" fill="none"><path d="M4 20 L4 16.5 L15 5.5 a1.8 1.8 0 0 1 2.5 0 l1 1 a1.8 1.8 0 0 1 0 2.5 L7.5 20 Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M13.5 7 L16 9.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </a>
    <a href="index.html" class="side-link" title="Scan an item">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.6"/><path d="M9.3 9.5a2.7 2.7 0 0 1 5.2-1c0 1.7-2.5 1.9-2.5 3.7" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="12" cy="16.3" r="0.9" fill="currentColor"/></svg>
    </a>
  </nav>
  <div class="side-bottom">
    <a href="login.html" id="sideAvatarLink" class="side-avatar" title="Account">
      <svg id="defaultAvatarIcon" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8.5" r="3.6" stroke="currentColor" stroke-width="1.6"/><path d="M4.5 20 c0 -4.2 3.4 -6.3 7.5 -6.3 s7.5 2.1 7.5 6.3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      <img id="userAvatarImg" src="" alt="" style="display:none;" />
    </a>
  </div>
</aside>

<button id="mobileMenuToggle" class="menu-toggle" type="button" aria-label="Deschide meniul">
  <svg viewBox="0 0 24 24" fill="none"><path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
</button>
<div id="sidebarBackdrop" class="sidebar-backdrop"></div>
<script>
  (function(){
    var toggle = document.getElementById('mobileMenuToggle');
    var sidebar = document.querySelector('.sidebar');
    var backdrop = document.getElementById('sidebarBackdrop');
    if(!toggle || !sidebar || !backdrop) return;
    function closeMenu(){ sidebar.classList.remove('open'); backdrop.classList.remove('open'); }
    function openMenu(){ sidebar.classList.add('open'); backdrop.classList.add('open'); }
    toggle.addEventListener('click', function(){
      if (sidebar.classList.contains('open')) { closeMenu(); } else { openMenu(); }
    });
    backdrop.addEventListener('click', closeMenu);
    sidebar.querySelectorAll('a').forEach(function(a){
      a.addEventListener('click', closeMenu);
    });
  })();
</script>


<main class="main-content">
  <header>
    <div class="logo">Pick Your Fit</div>
    <nav class="main-nav">
      <a href="landing.html#features">Features</a>
      <a href="landing.html#about">About</a>
      <a href="landing.html#contact">Contact</a>
    </nav>
    <div class="header-actions" id="headerActions">
      <a href="login.html" class="btn-header">Log in</a>
      <a href="signup.html" class="btn-header btn-header-dark">Register</a>
    </div>
  </header>

  <div class="arc-container" id="arcContainer">
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  const idToken = localStorage.getItem('pyf_idToken');
  const userPhoto = localStorage.getItem('pyf_userPhoto');
  const isLoggedIn = !!idToken;
  const arcContainer = document.getElementById('arcContainer');

  if (isLoggedIn) {
    const avatarLink = document.getElementById('sideAvatarLink');
    if (userPhoto) {
      document.getElementById('userAvatarImg').src = userPhoto;
      document.getElementById('userAvatarImg').style.display = 'block';
      document.getElementById('defaultAvatarIcon').style.display = 'none';
    }
    avatarLink.href = 'profile.html';
    document.getElementById('headerActions').innerHTML = '<a href="index.html" class="btn-header btn-header-dark">Scan New Item</a>';
  } else {
    arcContainer.innerHTML = '<div class="login-prompt"><h2>Your Archive is Locked</h2><p>Please <a href="login.html">Log In</a> or <a href="signup.html">Register</a> to look back at past years.</p></div>';
  }

  if (isLoggedIn) {
    arcContainer.innerHTML = '<p class="arc-sub">Loading your archive…</p>';
    PYFCal.init().then(initArchive).catch((err) => {
      console.error('Archive load error:', err);
      arcContainer.innerHTML = '<div class="login-prompt"><h2>Could not load your archive</h2><p>Please refresh the page, or log in again.</p></div>';
    });
  }

  function initArchive() {
    const { MONTH_NAMES, WEEKDAY_SHORT, getCalendarEntries, buildDateMap,
            deleteCalendarEntry, moveCalendarEntryToFavorites, renderOutfitComposite, monthMatrix } = PYFCal;

    const thisYear = new Date().getFullYear();
    const allEntries = getCalendarEntries();
    const yearsWithData = Array.from(new Set(allEntries.map((e) => (e.date || '').slice(0, 4)).filter(Boolean))).map(Number);
    let year = Math.max(...yearsWithData.filter((y) => y < thisYear), thisYear - 1);
    if (!isFinite(year)) year = thisYear - 1;

    arcContainer.innerHTML = `
      <p class="arc-heading">Archive</p>
      <p class="arc-sub">Look back at what you wore, year by year.</p>
      <div class="toolbar">
        <button type="button" class="nav-arrow" id="prevYearBtn" aria-label="Previous year">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <span class="year-label" id="yearLabel"></span>
        <button type="button" class="nav-arrow" id="nextYearBtn" aria-label="Next year">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M9 5l7 7-7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <a href="calendar.html" class="back-link">
          <svg viewBox="0 0 24 24" fill="none"><path d="M19 12H5M11 6l-6 6 6 6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Back to Calendar
        </a>
      </div>
      <div id="yearBody"></div>
    `;

    const yearLabel = document.getElementById('yearLabel');
    const yearBody = document.getElementById('yearBody');
    const nextYearBtn = document.getElementById('nextYearBtn');

    document.getElementById('prevYearBtn').onclick = () => { year -= 1; render(); };
    nextYearBtn.onclick = () => { if (year < thisYear - 1) { year += 1; render(); } };

    let toastTimer = null;
    function showToast(msg) {
      const toast = document.getElementById('toast');
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2400);
    }

    function miniActions(entry) {
      const wrap = document.createElement('div');
      wrap.className = 'arc-mini-actions';

      const del = document.createElement('button');
      del.type = 'button';
      del.title = 'Delete';
      del.innerHTML = '<svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>';
      del.onclick = async (e) => { e.stopPropagation(); await deleteCalendarEntry(entry); showToast('Removed from archive.'); render(); };

      const fav = document.createElement('button');
      fav.type = 'button';
      fav.className = 'fav-mini';
      fav.title = 'Delete and save to favorites';
      fav.innerHTML = '<svg viewBox="0 0 24 24" fill="none"><path d="M12 20 C6.5 15.8, 3.5 12, 3.5 8.2 C3.5 5.1, 5.8 3, 8.5 3 C10.3 3, 11.7 4, 12 5.6 C12.3 4, 13.7 3, 15.5 3 C18.2 3, 20.5 5.1, 20.5 8.2 C20.5 12, 17.5 15.8, 12 20 Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/></svg>';
      fav.onclick = async (e) => { e.stopPropagation(); await moveCalendarEntryToFavorites(entry); showToast('Moved to favorites.'); render(); };

      wrap.appendChild(del);
      wrap.appendChild(fav);
      return wrap;
    }

    function render() {
      yearLabel.textContent = year;
      nextYearBtn.disabled = year >= thisYear - 1;

      const dateMap = buildDateMap(getCalendarEntries().filter((e) => (e.date || '').startsWith(String(year))));
      const hasAny = Object.keys(dateMap).length > 0;

      yearBody.innerHTML = '';
      if (!hasAny) {
        const empty = document.createElement('p');
        empty.className = 'empty-year';
        empty.textContent = `No outfits were planned for ${year}.`;
        yearBody.appendChild(empty);
        return;
      }

      const grid = document.createElement('div');
      grid.className = 'arc-grid';

      for (let m = 0; m < 12; m++) {
        const monthCard = document.createElement('div');
        monthCard.className = 'arc-month';
        monthCard.innerHTML = `<div class="arc-month-title">${MONTH_NAMES[m]}</div>
          <div class="arc-weekdays">${WEEKDAY_SHORT.map((w) => `<span>${w}</span>`).join('')}</div>`;

        const daysWrap = document.createElement('div');
        daysWrap.className = 'arc-days';

        monthMatrix(year, m).forEach((cell) => {
          const dayEl = document.createElement('div');
          dayEl.className = 'arc-day' + (cell.inMonth ? '' : ' out-month');
          const numEl = document.createElement('span');
          numEl.className = 'arc-day-num';
          numEl.textContent = cell.dayNum;
          dayEl.appendChild(numEl);

          const entries = cell.inMonth ? (dateMap[cell.dateStr] || []) : [];
          if (entries.length) {
            const entry = entries[0];
            dayEl.appendChild(renderOutfitComposite(entry, 'pyf-arc-composite'));
            dayEl.appendChild(miniActions(entry));
          }
          daysWrap.appendChild(dayEl);
        });

        monthCard.appendChild(daysWrap);
        grid.appendChild(monthCard);
      }
      yearBody.appendChild(grid);
    }

    render();
  }
</script>

</body>
</html>
